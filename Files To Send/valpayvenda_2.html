<html>
    <body>
<script>
function formatarMoeda(campo) {
        var valor = campo.value.replace(/\D/g, '');
        valor = (valor / 100).toFixed(2).replace('.', ',');
        campo.value = valor;
    }
</script>
<div id="row">
	<div id="">

		<div class="col-md-9">
			<div class="form-horizontal">
				<div class="form-group">
					<div class="col-md-9">
						<input class="form-control" type="text" id="moeda" oninput="formatarMoeda(this)"/>
					</div>
				</div>
			</div>
		</div>
	</div>
    </body>
</html>
